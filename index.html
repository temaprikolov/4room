<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>4room — социальная платформа для музыкантов и продюсеров</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0c0d13;
  --s1: #12131b;
  --s2: #191a26;
  --s3s: #202130;
  --s4: #292a3d;
  --border: #2c2e48;
  --border2: #3a3c5a;
  --t1: #e8eaf0;
  --t2: #9899b3;
  --t3: #6b6d8a;
  --t4: #48496a;
  --blue: #4f7ed4;
  --blue2: #3a67c0;
  --blue3: #2952a3;
  --green: #3cb775;
  --red: #e05252;
  --amber: #f0a045;
  --purple: #9b6dda;
  --pink: #d96b9e;
  --cyan: #3dbccc;
  --r: 8px;
  --r2: 12px;
  --r3: 16px;
}

body {
  background: var(--bg);
  color: var(--t1);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

.w, .wn {
  max-width: 1040px;
  margin: 0 auto;
  padding: 0 16px;
}

.wn {
  max-width: 780px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 8px 18px;
  border-radius: var(--r);
  font-size: 14px;
  font-weight: 500;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  background: none;
  font-family: inherit;
}

.btn-p {
  background: linear-gradient(135deg, var(--blue), var(--blue3));
  color: #fff;
}

.btn-p:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(79,126,212,.4);
}

.btn-d {
  background: var(--s3s);
  border-color: var(--border2);
  color: var(--t1);
}

.btn-g {
  background: transparent;
  color: var(--t3);
  border-color: var(--border);
}

.btn-sm {
  padding: 5px 12px;
  font-size: 12px;
}

.btn-xs {
  padding: 3px 10px;
  font-size: 11px;
}

.btn-r {
  background: rgba(224,82,82,0.15);
  border-color: var(--red);
  color: var(--red);
}

input, textarea, select {
  background: var(--s1);
  color: var(--t1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 12px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
}

input:focus, textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(79,126,212,.14);
}

.card, .panel, .post, .feed, .beat-card, .drumkit-card, .service-card, .wall-post {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  overflow: hidden;
}

.ph {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-weight: 600;
}

.pb {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.pf {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--t3);
}

.empty-ico {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.4;
}

.pill {
  display: inline-flex;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: rgba(79,126,212,.15);
  color: var(--blue);
}

.stitle {
  font-size: 11px;
  font-weight: 700;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 12px;
}

.toast {
  position: fixed;
  bottom: 80px;
  right: 16px;
  z-index: 700;
  background: var(--s3s);
  border: 1px solid var(--border2);
  border-radius: var(--r2);
  padding: 12px 20px;
  font-size: 13px;
  opacity: 0;
  transform: translateX(110%);
  transition: all 0.24s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}

.toast.on {
  opacity: 1;
  transform: none;
}

.toast-err {
  border-color: var(--red);
  color: #faa;
}

.toast-ok {
  border-color: var(--green);
  color: #a8f0c0;
}

#toasts {
  position: fixed;
  bottom: 80px;
  right: 16px;
  z-index: 700;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 16px;
  overflow: hidden;
  flex-shrink: 0;
  background-color: var(--blue);
}

.avatar-sm {
  width: 32px;
  height: 32px;
  font-size: 13px;
}

.avatar-lg {
  width: 100px;
  height: 100px;
  font-size: 28px;
}

.flex {
  display: flex;
  align-items: center;
  gap: 8px;
}

.justify-between {
  justify-content: space-between;
}

.mt-2 {
  margin-top: 8px;
}

.mt-3 {
  margin-top: 12px;
}

.mb-4 {
  margin-bottom: 16px;
}

.w-100 {
  width: 100%;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal.open {
  display: flex;
}

.modal-content {
  background: var(--s2);
  border-radius: var(--r3);
  max-width: 500px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}

.modal-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-weight: 600;
}

.modal-body {
  padding: 16px;
}

.audio-player {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--s3s);
  padding: 8px;
  border-radius: var(--r);
  margin-top: 8px;
}

.audio-player button {
  background: var(--blue);
  border: none;
  color: white;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-family: inherit;
}

.file-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--s3s);
  border: 1px dashed var(--border2);
  border-radius: var(--r);
  cursor: pointer;
  font-size: 12px;
}

.file-label:hover {
  border-color: var(--blue);
  color: var(--blue);
}

.price {
  font-size: 18px;
  font-weight: 700;
  color: var(--blue);
  margin: 8px 0;
}

.error-text {
  color: var(--red);
  font-size: 12px;
  margin-top: 8px;
}

.gtabs, .stabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.gtab, .stab {
  padding: 6px 14px;
  border-radius: var(--r);
  background: var(--s3s);
  border: none;
  color: var(--t2);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
}

.gtab.on, .stab.on {
  background: var(--blue);
  color: white;
}

.beat-grid, .drumkit-grid, .service-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

.toolbar {
  margin-bottom: 24px;
}

.stats {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin: 16px 0;
}

.g2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

#hdr {
  background: rgba(12,13,19,.96);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 300;
}

.hi {
  display: flex;
  align-items: center;
  height: 56px;
  padding: 0 20px;
  gap: 16px;
  max-width: 1400px;
  margin: 0 auto;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  flex-shrink: 0;
}

.logo-ico {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--blue), var(--blue3));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: #fff;
}

.logo-txt {
  font-weight: 700;
  font-size: 18px;
}

#hnav {
  display: flex;
  gap: 4px;
  flex: 1;
  overflow-x: auto;
}

.hl {
  padding: 6px 14px;
  border-radius: var(--r);
  font-size: 13px;
  font-weight: 500;
  color: var(--t3);
  cursor: pointer;
  background: none;
  border: none;
  white-space: nowrap;
  font-family: inherit;
}

.hl:hover, .hl.on {
  color: var(--t1);
  background: var(--s3s);
}

#hr {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.ico-btn {
  background: none;
  border: none;
  color: var(--t3);
  cursor: pointer;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-family: inherit;
}

.ico-btn:hover {
  background: var(--s3s);
  color: var(--t1);
}

.page {
  display: none;
  padding: 24px 0 60px;
  animation: fadeIn 0.2s ease;
}

.page.on {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}

#mob-bnav {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(18,19,27,.97);
  backdrop-filter: blur(14px);
  border-top: 1px solid var(--border);
  z-index: 280;
}

.mbn {
  display: flex;
}

.mb-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 4px 10px;
  font-size: 10px;
  color: var(--t3);
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
}

.mb-btn.on {
  color: var(--blue);
}

@media (max-width: 760px) {
  #hnav { display: none; }
  #mob-bnav { display: block; }
  body { padding-bottom: 70px; }
  .g2 { grid-template-columns: 1fr; }
  .hi { padding: 0 12px; }
}
</style>
</head>
<body>

<div id="toasts"></div>
<div id="hdr">
  <div class="hi">
    <div class="logo" id="logo"><div class="logo-ico">4r</div><span class="logo-txt">4room</span></div>
    <nav id="hnav"></nav>
    <div id="hr"></div>
  </div>
</div>

<main>
  <div id="p-home" class="page"></div>
  <div id="p-board" class="page"></div>
  <div id="p-thread" class="page"></div>
  <div id="p-beats" class="page"></div>
  <div id="p-drumkits" class="page"></div>
  <div id="p-services" class="page"></div>
  <div id="p-music" class="page"></div>
  <div id="p-profile" class="page"></div>
  <div id="p-bmarks" class="page"></div>
  <div id="p-welcome" class="page"></div>
</main>

<footer style="border-top:1px solid var(--border);padding:20px;text-align:center;font-size:12px;color:var(--t4)">4room — социальная платформа для музыкантов и продюсеров</footer>

<div id="auth-ov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;align-items:center;justify-content:center;">
  <div id="auth-box" style="background:var(--s2);border-radius:var(--r3);max-width:400px;width:100%;margin:20px;overflow:hidden;"></div>
</div>
<div id="msg-panel" style="position:fixed;right:0;top:0;bottom:0;width:380px;background:var(--s1);border-left:1px solid var(--border);z-index:500;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;">
  <div id="mpi" style="flex:1;display:flex;flex-direction:column;"></div>
</div>
<div id="msg-bd" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:499;display:none;"></div>
<div id="player" style="position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(18,19,27,.98);backdrop-filter:blur(16px);border-top:1px solid var(--border);z-index:300;display:none;align-items:center;padding:0 20px;gap:12px;"><div id="p-cov" style="width:44px;height:44px;border-radius:8px;background:var(--s3s);display:flex;align-items:center;justify-content:center;">♪</div><div style="flex:1"><div id="p-ttl" style="font-weight:500">—</div><div id="p-art" style="font-size:11px;color:var(--t3)"></div></div><button id="p-pbtn" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--t1);width:40px;">▶</button><div style="flex:1;max-width:300px;height:4px;background:var(--s4);border-radius:4px;cursor:pointer;" id="p-bar"><div id="p-bar-f" style="height:100%;background:var(--blue);width:0%;border-radius:4px;"></div></div><span id="p-time" style="font-size:12px;min-width:45px;">0:00</span><input type="range" class="p-vol" min="0" max="1" step="0.05" value="0.8" style="width:80px;"><button id="p-close" style="background:none;border:none;color:var(--t4);cursor:pointer;font-size:18px;">✕</button></div>
<nav id="mob-bnav"><div class="mbn"><button class="mb-btn" data-nav="home">🏠<span>Главная</span></button><button class="mb-btn" data-nav="beats">♪<span>Биты</span></button><button class="mb-btn" data-nav="drumkits">🥁<span>Драмкиты</span></button><button class="mb-btn" data-nav="services">🛠<span>Услуги</span></button></div></nav>

<script>
// ==================== КОНФИГ ====================
const ADMIN_LOGIN = 'temaprikolov';
const ADMIN_PASS = 'Daraso19';

// ==================== СОСТОЯНИЕ ====================
let S = { 
  threads: [], replies: {}, beats: [], drumkits: [], services: [], 
  wallPosts: {}, convs: [], reactions: {}, postViews: {}, comments: {},
  counter: 1000 
};
let users = JSON.parse(localStorage.getItem('4r_users') || '[]');
let sess = JSON.parse(localStorage.getItem('4r_session') || 'null');
let _theme = localStorage.getItem('4r_theme') || 'dark';
let _bg = 'all', _bs = 'newest';
let _activeConv = null;

// ==================== УТИЛИТЫ ====================
function toast(msg, isErr) {
  let box = document.getElementById('toasts');
  if (!box) return;
  let el = document.createElement('div');
  el.className = 'toast' + (isErr ? ' toast-err' : ' toast-ok');
  el.textContent = msg;
  box.appendChild(el);
  setTimeout(function() { el.classList.add('on'); }, 10);
  setTimeout(function() { el.classList.remove('on'); setTimeout(function() { el.remove(); }, 300); }, 3200);
}
function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function relTime(ts) { let d = Math.floor((Date.now() - ts) / 1000); if (d < 60) return d + 'с'; if (d < 3600) return Math.floor(d / 60) + 'м'; if (d < 86400) return Math.floor(d / 3600) + 'ч'; return Math.floor(d / 86400) + 'д'; }
function mkId() { S.counter = S.counter + 1; return String(S.counter); }
function persist() { 
  localStorage.setItem('4r_data', JSON.stringify(S)); 
  localStorage.setItem('4r_users', JSON.stringify(users)); 
  localStorage.setItem('4r_session', JSON.stringify(sess)); 
}
function loadData() { 
  let d = localStorage.getItem('4r_data'); 
  if (d) { 
    try { 
      let p = JSON.parse(d); 
      Object.assign(S, p); 
      if (!S.reactions) S.reactions = {}; 
      if (!S.postViews) S.postViews = {};
      if (!S.comments) S.comments = {};
    } catch(e) { console.error('Error loading data', e); } 
  }
  // Создаем админа если его нет
  let adminExists = users.find(function(u) { return u.username === ADMIN_LOGIN; });
  if (!adminExists) {
    users.unshift({
      id: 'u_admin',
      username: ADMIN_LOGIN,
      password: ADMIN_PASS,
      avatarBase64: null,
      bio: 'Администратор платформы',
      badges: ['admin', 'verified'],
      isAdmin: true,
      banned: false,
      privacy: { wall: 'all', comment: 'all', profileLocked: false },
      friends: [],
      followers: [],
      createdAt: Date.now()
    });
    persist();
  }
}
loadData();

function getUser(id) { return users.find(function(u) { return u.id === id; }); }
function updateUser(id, data) { 
  let idx = -1;
  for (let i = 0; i < users.length; i++) {
    if (users[i].id === id) { idx = i; break; }
  }
  if (idx !== -1) { 
    for (let key in data) { users[idx][key] = data[key]; }
    if (sess && sess.id === id) sess = users[idx]; 
    persist(); 
  } 
}
function isAdmin() { return sess && sess.username === ADMIN_LOGIN; }

// ==================== РЕГИСТРАЦИЯ ====================
function register(username, password) {
  if (!username || username.length < 3) return { ok: false, err: 'Имя не менее 3 символов' };
  if (!password || password.length < 4) return { ok: false, err: 'Пароль не менее 4 символов' };
  let existing = false;
  for (let i = 0; i < users.length; i++) {
    if (users[i].username === username) { existing = true; break; }
  }
  if (existing) return { ok: false, err: 'Имя занято' };
  let newUser = {
    id: 'u' + mkId(),
    username: username,
    password: password,
    avatarBase64: null,
    bio: '',
    badges: ['early'],
    isAdmin: false,
    banned: false,
    privacy: { wall: 'all', comment: 'all', profileLocked: false },
    friends: [],
    followers: [],
    createdAt: Date.now()
  };
  users.push(newUser);
  persist();
  return { ok: true, user: newUser };
}
function login(username, password) {
  let user = null;
  for (let i = 0; i < users.length; i++) {
    if (users[i].username === username && users[i].password === password) {
      user = users[i];
      break;
    }
  }
  if (!user) return { ok: false, err: 'Неверное имя или пароль' };
  if (user.banned) return { ok: false, err: 'Аккаунт заблокирован' };
  sess = { id: user.id, username: user.username, isAdmin: user.isAdmin, avatarBase64: user.avatarBase64 };
  persist();
  return { ok: true, user: user };
}
function logout() { sess = null; persist(); render(); }

// ==================== HEADER ====================
function buildHeader() {
  let nav = document.getElementById('hnav');
  if (nav && sess) {
    nav.innerHTML = 
      '<button class="hl" onclick="nav(\'#/board/tech\')">⚙ Тех-раздел</button>' +
      '<button class="hl" onclick="nav(\'#/board/art\')">◈ Арт</button>' +
      '<button class="hl" onclick="nav(\'#/board/music\')">♪ Музыка</button>' +
      '<button class="hl" onclick="nav(\'#/board/shitposting\')">✦ Шитпостинг</button>' +
      '<button class="hl" onclick="nav(\'#/beats\')">♪ Биты</button>' +
      '<button class="hl" onclick="nav(\'#/drumkits\')">🥁 Драмкиты</button>' +
      '<button class="hl" onclick="nav(\'#/services\')">🛠 Услуги</button>';
  }
  let hr = document.getElementById('hr');
  if (hr) {
    if (sess) {
      hr.innerHTML = 
        '<button class="ico-btn" onclick="toggleTheme()">' + (_theme === 'light' ? '🌙' : '☀') + '</button>' +
        '<button class="ico-btn" onclick="openMsgPanel()">✉</button>' +
        '<div style="position:relative">' +
          '<button class="ico-btn" onclick="toggleUmenu()" style="padding:0;width:auto;">' + getAvatarHTML(sess, 36) + '</button>' +
          '<div id="umenu" style="display:none;position:absolute;right:0;top:100%;margin-top:8px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);min-width:200px;z-index:400;">' +
            '<div style="padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600">' + esc(sess.username) + '</div>' +
            '<div style="padding:10px 16px;cursor:pointer" onclick="nav(\'#/profile\');closeUmenu()">👤 Мой профиль</div>' +
            '<div style="height:1px;background:var(--border);margin:4px 0"></div>' +
            '<div style="padding:10px 16px;cursor:pointer;color:var(--red)" onclick="logout();closeUmenu()">🚪 Выйти</div>' +
          '</div>' +
        '</div>';
    } else {
      hr.innerHTML = '<button class="ico-btn" onclick="toggleTheme()">' + (_theme === 'light' ? '🌙' : '☀') + '</button><button class="btn btn-p" onclick="openAuth()">Войти</button><button class="btn btn-d" onclick="openReg()">Регистрация</button>';
    }
  }
}
function getAvatarHTML(user, size) {
  if (!user) return '<div class="avatar" style="width:' + size + 'px;height:' + size + 'px;"></div>';
  let bgStyle = user.avatarBase64 ? 'url(' + user.avatarBase64 + ') center/cover' : '#4f7ed4';
  let letter = !user.avatarBase64 ? (user.username ? user.username[0].toUpperCase() : '?') : '';
  return '<div class="avatar" style="width:' + size + 'px;height:' + size + 'px;background:' + bgStyle + ';display:flex;align-items:center;justify-content:center;font-weight:600;">' + letter + '</div>';
}
function toggleUmenu() { let m = document.getElementById('umenu'); if (m) m.style.display = m.style.display === 'none' ? 'block' : 'none'; }
function closeUmenu() { var m = document.getElementById('umenu'); if (m) m.style.display = 'none'; }

// ==================== СООБЩЕНИЯ ====================
function openMsgPanel() { 
  document.getElementById('msg-panel').style.transform = 'translateX(0)'; 
  document.getElementById('msg-bd').style.display = 'block'; 
  renderMsgPanel(); 
}
function closeMsgPanel() { 
  document.getElementById('msg-panel').style.transform = 'translateX(100%)'; 
  document.getElementById('msg-bd').style.display = 'none'; 
  _activeConv = null;
}
function renderMsgPanel() {
  if (!sess) return;
  let convs = [];
  for (let i = 0; i < S.convs.length; i++) {
    if (S.convs[i].participants && S.convs[i].participants.indexOf(sess.id) !== -1) {
      convs.push(S.convs[i]);
    }
  }
  let html = '<div class="ph">Сообщения<button onclick="closeMsgPanel()" style="background:none;border:none;font-size:18px;cursor:pointer;">✕</button></div><div id="conv-list" class="conv-list">';
  if (convs.length === 0) {
    html += '<div class="empty">Нет диалогов</div>';
  } else {
    for (let i = 0; i < convs.length; i++) {
      let c = convs[i];
      let otherId = null;
      for (let j = 0; j < c.participants.length; j++) {
        if (c.participants[j] !== sess.id) { otherId = c.participants[j]; break; }
      }
      let otherUser = getUser(otherId);
      html += '<div class="conv-item" onclick="openConv(\'' + c.id + '\')"><div class="avatar avatar-sm" style="background:var(--purple);font-size:16px;">💬</div><div><div class="conv-name">' + esc(otherUser ? otherUser.username : 'Диалог') + '</div></div></div>';
    }
  }
  html += '</div>';
  if (_activeConv) {
    let conv = null;
    for (let i = 0; i < convs.length; i++) {
      if (convs[i].id === _activeConv) { conv = convs[i]; break; }
    }
    if (conv) renderChatView(conv);
    else { _activeConv = null; renderMsgPanel(); }
    return;
  }
  document.getElementById('mpi').innerHTML = html;
}
function renderChatView(conv) {
  if (!conv) { _activeConv = null; renderMsgPanel(); return; }
  let otherId = null;
  for (let j = 0; j < conv.participants.length; j++) {
    if (conv.participants[j] !== sess.id) { otherId = conv.participants[j]; break; }
  }
  let otherUser = getUser(otherId);
  let msgs = '';
  if (conv.messages) {
    for (let i = 0; i < conv.messages.length; i++) {
      let m = conv.messages[i];
      msgs += '<div class="' + (m.fromUid === sess.id ? 'bubble mine' : 'bubble theirs') + '">' + esc(m.content) + '<div style="font-size:10px;color:var(--t4);margin-top:2px">' + relTime(m.createdAt) + '</div></div>';
    }
  }
  document.getElementById('mpi').innerHTML = 
    '<div class="ph"><button style="background:none;border:none;cursor:pointer;font-size:18px;" onclick="_activeConv=null;renderMsgPanel()">←</button>' + esc(otherUser ? otherUser.username : 'Диалог') + '<button onclick="closeMsgPanel()" style="background:none;border:none;font-size:18px;cursor:pointer;">✕</button></div>' +
    '<div class="chat-msgs" id="chat-msgs">' + (msgs || '<div class="empty">Нет сообщений</div>') + '</div>' +
    '<div class="chat-input-area">' +
      '<textarea id="chat-in" class="editor-textarea" placeholder="Сообщение..." rows="3" style="min-height:60px"></textarea>' +
      '<div class="flex justify-between"><button class="btn btn-p btn-sm" onclick="sendMsg()">→ Отправить</button></div>' +
    '</div>';
  setTimeout(function() { let el = document.getElementById('chat-msgs'); if (el) el.scrollTop = el.scrollHeight; }, 50);
}
function openConv(id) { _activeConv = id; renderMsgPanel(); }
function sendMsg() {
  if (!sess) return;
  let conv = null;
  for (let i = 0; i < S.convs.length; i++) {
    if (S.convs[i].id === _activeConv) { conv = S.convs[i]; break; }
  }
  if (!conv) return;
  let textarea = document.getElementById('chat-in');
  let text = textarea ? textarea.value.trim() : '';
  if (!text) return;
  if (!conv.messages) conv.messages = [];
  conv.messages.push({ id: 'm' + mkId(), fromUid: sess.id, content: text, createdAt: Date.now(), readBy: [sess.id] });
  persist();
  if (textarea) textarea.value = '';
  renderMsgPanel();
}
function startDM(userId, initialMessage) {
  if (!sess) return;
  let existing = null;
  for (let i = 0; i < S.convs.length; i++) {
    let c = S.convs[i];
    if (c.type === 'dm' && c.participants && c.participants.indexOf(sess.id) !== -1 && c.participants.indexOf(userId) !== -1) {
      existing = c; break;
    }
  }
  if (existing) {
    if (initialMessage) {
      if (!existing.messages) existing.messages = [];
      existing.messages.push({ id: 'm' + mkId(), fromUid: sess.id, content: initialMessage, createdAt: Date.now(), readBy: [sess.id] });
      persist();
    }
    _activeConv = existing.id;
  } else {
    let newConv = { id: 'c' + mkId(), type: 'dm', participants: [sess.id, userId], messages: initialMessage ? [{ id: 'm' + mkId(), fromUid: sess.id, content: initialMessage, createdAt: Date.now(), readBy: [sess.id] }] : [], createdAt: Date.now() };
    S.convs.push(newConv);
    persist();
    _activeConv = newConv.id;
  }
  openMsgPanel();
}

function doLogin() {
  let username = document.getElementById('login-username') ? document.getElementById('login-username').value.trim() : '';
  let password = document.getElementById('login-password') ? document.getElementById('login-password').value : '';
  let res = login(username, password);
  if (!res.ok) { let errDiv = document.getElementById('login-error'); if (errDiv) errDiv.textContent = res.err; return; }
  closeAuth();
  buildHeader();
  render();
  toast('Добро пожаловать, ' + username + '!');
}
function doRegister() {
  let username = document.getElementById('reg-username') ? document.getElementById('reg-username').value.trim() : '';
  let password = document.getElementById('reg-password') ? document.getElementById('reg-password').value : '';
  let password2 = document.getElementById('reg-password2') ? document.getElementById('reg-password2').value : '';
  if (password !== password2) { let errDiv = document.getElementById('reg-error'); if (errDiv) errDiv.textContent = 'Пароли не совпадают'; return; }
  let res = register(username, password);
  if (!res.ok) { let errDiv = document.getElementById('reg-error'); if (errDiv) errDiv.textContent = res.err; return; }
  closeAuth();
  sess = { id: res.user.id, username: res.user.username, isAdmin: res.user.isAdmin, avatarBase64: res.user.avatarBase64 };
  persist();
  buildHeader();
  render();
  toast('Аккаунт создан! Добро пожаловать, ' + username + '!');
}
function closeAuth() { document.getElementById('auth-ov').style.display = 'none'; }
function nav(hash) { 
  location.hash = hash; 
  render(); 
}

function addReply(threadId) {
  let content = document.getElementById('reply-text') ? document.getElementById('reply-text').value.trim() : '';
  if (!content) { toast('Введите текст ответа', true); return; }
  let reply = { id: 'r' + mkId(), uid: sess.id, author: sess.username, content: content, createdAt: Date.now() };
  if (!S.replies[threadId]) S.replies[threadId] = [];
  S.replies[threadId].push(reply);
  for (let i = 0; i < S.threads.length; i++) {
    if (S.threads[i].id === threadId) { 
      S.threads[i].replyCount = (S.threads[i].replyCount || 0) + 1; 
      S.threads[i].lastActivity = Date.now(); 
      break; 
    }
  }
  persist();
  toast('Ответ добавлен!');
  renderThread(threadId);
}

function toggleForm(type) { let f = document.getElementById('form-' + type); if (f) f.style.display = f.style.display === 'none' ? 'block' : 'none'; }
function submitItem(type) {
  let title = document.getElementById(type + '-title') ? document.getElementById(type + '-title').value.trim() : '';
  if (!title) { toast('Введите название', true); return; }
  let item = { id: type[0] + mkId(), uid: sess.id, title: title, price: parseFloat(document.getElementById(type + '-price') ? document.getElementById(type + '-price').value : 0) || 0, desc: document.getElementById(type + '-desc') ? document.getElementById(type + '-desc').value : '', createdAt: Date.now() };
  S[type].push(item);
  persist();
  toast('Опубликовано!');
  toggleForm(type);
  if (type === 'beats') renderBeats();
  else if (type === 'drumkits') renderDrumkits();
  else renderServices();
}
function buyItem(type, id) {
  let item = null;
  for (let i = 0; i < S[type].length; i++) {
    if (S[type][i].id === id) { item = S[type][i]; break; }
  }
  if (item) startDM(item.uid, 'Интересуюсь ' + (type === 'beats' ? 'битом' : type === 'drumkits' ? 'драмкитом' : 'услугой') + ': ' + item.title);
}

function render() {
  buildHeader();
  if (!sess) {
    renderWelcome();
    return;
  }
  let hash = location.hash.slice(1) || '/';
  if (hash === '/' || hash === '') renderHome();
  else if (hash === '/beats') renderBeats();
  else if (hash === '/drumkits') renderDrumkits();
  else if (hash === '/services') renderServices();
  else if (hash === '/music') renderMusic();
  else if (hash === '/profile') renderProfile(sess.id);
  else if (hash === '/bmarks') renderBookmarks();
  else if (hash.startsWith('/board/')) renderBoard(hash.slice(7));
  else if (hash.startsWith('/thread/')) renderThread(hash.slice(8));
  else if (hash.startsWith('/profile/')) renderProfile(hash.slice(9));
  else renderHome();
}
function showPage(id) { 
  let pages = ['p-home', 'p-board', 'p-thread', 'p-beats', 'p-drumkits', 'p-services', 'p-music', 'p-profile', 'p-bmarks', 'p-welcome'];
  for (let i = 0; i < pages.length; i++) {
    let p = document.getElementById(pages[i]);
    if (p) p.classList.remove('on');
  }
  let page = document.getElementById(id);
  if (page) page.classList.add('on'); 
}

// ==================== ПЛЕЕР ====================
let player = { audio: null, init: function() { this.audio = new Audio(); this.audio.volume = 0.8; }, play: function(url, title) { if (this.audio.src !== url) this.audio.src = url; document.getElementById('p-ttl').textContent = title || '—'; document.getElementById('player').style.display = 'flex'; this.audio.play(); }, toggle: function() { this.audio.paused ? this.audio.play() : this.audio.pause(); }, updateUI: function() { let btn = document.getElementById('p-pbtn'); if (btn) btn.textContent = this.audio && this.audio.paused ? '▶' : '⏸'; }, hide: function() { this.audio.pause(); document.getElementById('player').style.display = 'none'; } };
player.init(); 
player.audio.onplay = function() { player.updateUI(); }; 
player.audio.onpause = function() { player.updateUI(); }; 
player.audio.ontimeupdate = function() { 
  let pct = (player.audio.currentTime / player.audio.duration) * 100 || 0; 
  let bar = document.getElementById('p-bar-f');
  if (bar) bar.style.width = pct + '%'; 
  let timeEl = document.getElementById('p-time');
  if (timeEl) timeEl.textContent = Math.floor(player.audio.currentTime / 60) + ':' + String(Math.floor(player.audio.currentTime % 60)).padStart(2,'0'); 
};

// ==================== ЗАПУСК ====================
document.addEventListener('DOMContentLoaded', function() {
  document.body.classList.toggle('light', _theme === 'light');
  var logo = document.getElementById('logo');
  if (logo) logo.onclick = function() { nav('#/'); };
  var msgBd = document.getElementById('msg-bd');
  if (msgBd) msgBd.onclick = closeMsgPanel;
  var pClose = document.getElementById('p-close');
  if (pClose) pClose.addEventListener('click', function() { player.hide(); });
  var pPbtn = document.getElementById('p-pbtn');
  if (pPbtn) pPbtn.addEventListener('click', function() { player.toggle(); });
  var pBar = document.getElementById('p-bar');
  if (pBar) pBar.addEventListener('click', function(e) { if (player.audio) { var rect = e.target.getBoundingClientRect(); player.audio.currentTime = ((e.clientX - rect.left) / rect.width) * player.audio.duration; } });
  var pVol = document.querySelector('.p-vol');
  if (pVol) pVol.addEventListener('input', function(e) { if (player.audio) player.audio.volume = parseFloat(e.target.value); });
  
  var mbBtns = document.querySelectorAll('.mb-btn');
  for (var i = 0; i < mbBtns.length; i++) {
    mbBtns[i].addEventListener('click', function() {
      var action = this.getAttribute('data-nav');
      var pathMap = { home: '/', beats: '/beats', drumkits: '/drumkits', services: '/services' };
      nav('#' + pathMap[action]);
    });
  }
  
  render();
});
</script>
