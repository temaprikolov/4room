<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>404 | TEMAPRIKOLOV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #0a0a0a 0%, #030303 50%, #000000 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* void эффект — дымка */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 720px;
            width: 100%;
            text-align: center;
            animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 404 — главный монстр */
        .error-glitch {
            font-size: clamp(8rem, 25vw, 16rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(125deg, #ffffff 20%, #aaaaaa 40%, #3a3a3a 60%, #ffffff 80%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: shimmer 5s linear infinite, glitchText 2.5s infinite alternate;
            text-shadow: 0 0 25px rgba(255,255,255,0.2);
            margin-bottom: 1.5rem;
            line-height: 1;
        }

        /* текст про хуйню и реконструкцию */
        .message {
            margin: 1.8rem 0 2.2rem 0;
            animation: fadeSlide 0.8s ease 0.2s forwards;
            opacity: 0;
            transform: translateY(12px);
            animation-fill-mode: forwards;
        }

        .main-text {
            font-size: clamp(1.3rem, 5vw, 1.9rem);
            font-weight: 500;
            color: #e0e0e0;
            letter-spacing: -0.2px;
            background: linear-gradient(135deg, #ececec, #b0b0b0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .sub-line {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            color: #7a7a7a;
            margin-top: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* кнопка — чистая, но конфетка */
        .tg-button-wrapper {
            margin: 2.8rem 0 1rem;
            animation: fadeSlide 0.8s ease 0.35s forwards;
            opacity: 0;
            transform: translateY(12px);
            animation-fill-mode: forwards;
        }

        .tg-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 1rem 2.8rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            color: white;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .tg-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s ease;
        }

        .tg-button:hover {
            background: rgba(35, 35, 45, 0.9);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.03);
            box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 15px rgba(255,255,255,0.1);
        }

        .tg-button:hover::before {
            left: 100%;
        }

        .tg-button:active {
            transform: scale(0.98);
        }

        /* иконка телеграма (тонкая) */
        .tg-icon {
            width: 22px;
            height: 22px;
            fill: white;
            transition: transform 0.2s;
        }

        .tg-button:hover .tg-icon {
            transform: translateX(3px);
        }

        /* анимации */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(35px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeSlide {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 200% 50%;
            }
        }

        @keyframes glitchText {
            0% {
                text-shadow: -2px 0 rgba(255,255,255,0.2), 2px 0 rgba(0,0,0,0.3);
                transform: skew(0deg);
            }
            25% {
                text-shadow: 2px 0 rgba(255,255,255,0.3), -1px 0 rgba(0,0,0,0.4);
                transform: skew(0.8deg);
            }
            50% {
                text-shadow: -1px 0 rgba(255,255,255,0.2), 2px 0 rgba(0,0,0,0.2);
                transform: skew(-0.8deg);
            }
            75% {
                text-shadow: 1px 0 rgba(255,255,255,0.3), -2px 0 rgba(0,0,0,0.3);
                transform: skew(0.4deg);
            }
            100% {
                text-shadow: 0px 0px 8px rgba(255,255,255,0.4);
                transform: skew(0deg);
            }
        }

        /* дополнительные void-элементы: парящие точки */
        .void-particle {
            position: fixed;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 80%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: floatVoid 18s infinite alternate ease-in-out;
        }

        @keyframes floatVoid {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            100% {
                transform: translate(40px, -30px) scale(1.2);
                opacity: 0;
            }
        }

        /* минималистичный футер */
        .void-footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #2b2b2b;
            letter-spacing: 1px;
            font-weight: 300;
            animation: fadeSlide 0.8s ease 0.5s forwards;
            opacity: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 404 большими с шиммером и глитчем -->
    <div class="error-glitch">404</div>

    <div class="message">
        <div class="main-text">сайт получился хуйней,</div>
        <div class="main-text" style="margin-top: 0.3rem;">ща занимаюсь реконструкцией</div>
        <div class="sub-line">скоро здесь будет новый уровень</div>
    </div>

    <div class="tg-button-wrapper">
        <a href="https://t.me/temaprikolov2" class="tg-button" target="_blank" rel="noopener noreferrer">
            <svg class="tg-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.6-1.38-.97-2.23-1.56-.99-.68-.35-1.06.22-1.67.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.13-.07-.18-.08-.05-.2-.03-.28-.02-.12.02-1.95 1.24-5.5 3.64-.52.36-.99.53-1.41.52-.46-.01-1.35-.26-2.01-.48-.81-.27-1.46-.41-1.4-.87.03-.24.36-.48.99-.73 3.9-1.7 6.5-2.82 7.8-3.36 3.71-1.54 4.48-1.81 4.98-1.82.11 0 .36.03.52.18.13.13.17.31.19.48.01.11.02.27-.01.44z"/>
            </svg>
            Перейти в Telegram
        </a>
    </div>
    <div class="void-footer">
        TEMAPRIKOLOV // void mode
    </div>
</div>

<script>
    // создаем парящие void-частицы для атмосферы (легкие, не мешают)
    (function addVoidParticles() {
        const particleCount = 22;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('void-particle');
            const size = Math.random() * 180 + 40;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 12 + 's';
            particle.style.animationDuration = Math.random() * 20 + 12 + 's';
            document.body.appendChild(particle);
        }
    })();
</script>
</body>
</html>
