<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>4room — социальная платформа для музыкантов и продюсеров</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --bg: #0c0d13; --s1: #12131b; --s2: #191a26; --s3s: #202130; --s4: #292a3d; --border: #2c2e48; --border2: #3a3c5a; --t1: #e8eaf0; --t2: #9899b3; --t3: #6b6d8a; --t4: #48496a; --blue: #4f7ed4; --green: #3cb775; --red: #e05252; --amber: #f0a045; --purple: #9b6dda; --pink: #d96b9e; --r: 8px; --r2: 12px; --r3: 16px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--t1); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; padding-bottom: 72px; transition: background 0.2s; }
body.light { --bg: #f2f4f8; --s1: #ffffff; --s2: #eaecf2; --s3s: #d5d8e4; --s4: #c8ccda; --border: #cdd0de; --border2: #b5b9cc; --t1: #1a1b2e; --t2: #363755; --t3: #585a78; --t4: #878aaa; }
.w, .wn { max-width: 1040px; margin: 0 auto; padding: 0 16px; }
.wn { max-width: 780px; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 8px 18px; border-radius: var(--r); font-size: 14px; font-weight: 500; border: 1px solid transparent; cursor: pointer; transition: all 0.2s; }
.btn-p { background: linear-gradient(135deg, var(--blue), #2952a3); color: #fff; }
.btn-p:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79,126,212,.4); }
.btn-d { background: var(--s3s); border-color: var(--border2); color: var(--t1); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-help { background: linear-gradient(135deg, var(--purple), var(--pink)); color: #fff; }
input, textarea, select { background: var(--s1); color: var(--t1); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px; font-size: 14px; outline: none; }
input:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,126,212,.14); }
.card, .panel, .post, .feed { background: var(--s2); border: 1px solid var(--border); border-radius: var(--r2); overflow: hidden; }
.ph { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: 600; }
.pb { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.pf { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.empty { padding: 60px 20px; text-align: center; color: var(--t3); }
.empty-ico { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
.pill { display: inline-flex; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(79,126,212,.15); color: var(--blue); }
.stitle { font-size: 11px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
.toast { position: fixed; bottom: 80px; right: 16px; z-index: 700; background: var(--s3s); border: 1px solid var(--border2); border-radius: var(--r2); padding: 12px 20px; font-size: 13px; opacity: 0; transform: translateX(110%); transition: all 0.24s cubic-bezier(.34,1.56,.64,1); }
.toast.on { opacity: 1; transform: none; }
.toast-err { border-color: var(--red); color: #faa; }
.toast-ok { border-color: var(--green); color: #a8f0c0; }
#toasts { position: fixed; bottom: 80px; right: 16px; z-index: 700; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; overflow: hidden; }
.avatar-sm { width: 32px; height: 32px; font-size: 13px; }
#hdr { background: rgba(12,13,19,.96); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 300; }
.hi { display: flex; align-items: center; height: 56px; padding: 0 20px; gap: 16px; }
.logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.logo-ico { width: 32px; height: 32px; border-radius: 10px; background: linear-gradient(135deg, var(--blue), #2952a3); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; }
.logo-txt { font-weight: 700; font-size: 18px; }
#hnav { display: flex; gap: 4px; flex: 1; overflow-x: auto; }
.hl { padding: 6px 14px; border-radius: var(--r); font-size: 13px; font-weight: 500; color: var(--t3); cursor: pointer; background: none; border: none; white-space: nowrap; }
.hl:hover, .hl.on { color: var(--t1); background: var(--s3s); }
#hr { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.ico-btn { background: none; border: none; color: var(--t3); cursor: pointer; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.ico-btn:hover { background: var(--s3s); color: var(--t1); }
.page { display: none; padding: 24px 0 60px; animation: fadeIn 0.2s ease; }
.page.on { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
#mob-bnav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(18,19,27,.97); backdrop-filter: blur(14px); border-top: 1px solid var(--border); z-index: 280; }
.mbn { display: flex; }
.mb-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 4px 10px; font-size: 10px; color: var(--t3); cursor: pointer; background: none; border: none; }
.mb-btn.on { color: var(--blue); }
.mb-ico { font-size: 20px; }
@media (max-width: 760px) { #hnav { display: none; } #mob-btn { display: block; } #mob-bnav { display: block; } body { padding-bottom: 70px; } .g2 { grid-template-columns: 1fr; } }
.stories-bar { display: flex; gap: 16px; overflow-x: auto; padding: 8px 0 16px; margin-bottom: 8px; }
.story-item { text-align: center; cursor: pointer; flex-shrink: 0; }
.story-ring { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, var(--amber), var(--pink)); padding: 2px; }
.story-ring-inner { width: 100%; height: 100%; border-radius: 50%; background: var(--s2); display: flex; align-items: center; justify-content: center; font-size: 28px; overflow: hidden; }
.story-name { font-size: 11px; margin-top: 6px; color: var(--t3); }
.post { padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
.post:hover { background: var(--s3s); }
.post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.price { font-size: 18px; font-weight: 700; color: var(--green); margin: 8px 0; }
.tg-login-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #2aabee; color: white; padding: 12px 28px; border-radius: 10px; text-decoration: none; font-weight: 500; font-size: 16px; transition: all 0.2s; margin: 10px 0; }
.tg-login-btn:hover { background: #1f8bc9; transform: translateY(-2px); }
</style>
</head>
<body>
<div id="toasts"></div>
<div id="hdr"><div class="hi"><div class="logo" id="logo"><div class="logo-ico">4r</div><span class="logo-txt">4room</span></div><nav id="hnav"></nav><div id="hr"></div><button id="mob-btn" style="display:none;background:none;border:none;font-size:22px;color:var(--t3)">☰</button></div></div>
<main><div id="p-home" class="page"></div><div id="p-board" class="page"></div><div id="p-thread" class="page"></div><div id="p-beats" class="page"></div><div id="p-drumkits" class="page"></div><div id="p-services" class="page"></div><div id="p-music" class="page"></div><div id="p-profile" class="page"></div><div id="p-admin" class="page"></div><div id="p-bmarks" class="page"></div></main>
<footer style="border-top:1px solid var(--border);padding:20px;text-align:center;font-size:12px;color:var(--t4)">4room — социальная платформа для музыкантов и продюсеров</footer>
<div id="auth-ov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;align-items:center;justify-content:center;"><div id="auth-box" style="background:var(--s2);border-radius:var(--r3);max-width:400px;width:100%;margin:20px;overflow:hidden;"></div></div>
<div id="msg-panel" style="position:fixed;right:0;top:0;bottom:0;width:380px;background:var(--s1);border-left:1px solid var(--border);z-index:500;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;"><div id="mpi" style="flex:1;"></div></div>
<div id="msg-bd" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:499;display:none;"></div>
<div id="notif-panel" style="position:fixed;right:60px;top:64px;width:360px;max-height:80vh;background:var(--s2);border:1px solid var(--border);border-radius:var(--r3);z-index:500;display:none;flex-direction:column;"></div>
<div id="search-ov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:flex-start;justify-content:center;padding-top:100px;"><div id="search-box" style="background:var(--s2);border-radius:var(--r3);width:100%;max-width:560px;margin:0 20px;overflow:hidden;"><div style="display:flex;padding:16px;gap:12px;"><input id="s-inp" type="text" placeholder="Поиск..." style="flex:1"><button class="btn btn-g btn-sm" onclick="closeSearch()">✕</button></div><div id="s-res" style="max-height:400px;overflow-y:auto;"></div></div></div>
<div id="player" style="position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(18,19,27,.98);backdrop-filter:blur(16px);border-top:1px solid var(--border);z-index:300;display:none;align-items:center;padding:0 20px;gap:12px;"><div id="p-cov" style="width:44px;height:44px;border-radius:8px;background:var(--s3s);display:flex;align-items:center;justify-content:center;">♪</div><div style="flex:1"><div id="p-ttl" style="font-weight:500">—</div><div id="p-art" style="font-size:11px;color:var(--t3)"></div></div><button id="p-pbtn" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--t1);width:40px;">▶</button><div style="flex:1;max-width:300px;height:4px;background:var(--s4);border-radius:4px;cursor:pointer;" id="p-bar"><div id="p-bar-f" style="height:100%;background:var(--blue);width:0%;border-radius:4px;"></div></div><span id="p-time" style="font-size:12px;min-width:45px;">0:00</span><input type="range" class="p-vol" min="0" max="1" step="0.05" value="0.8" style="width:80px;"><button id="p-close" style="background:none;border:none;color:var(--t4);cursor:pointer;font-size:18px;">✕</button></div>
<nav id="mob-bnav"><div class="mbn"><button class="mb-btn" id="mbn0">🏠<span>Главная</span></button><button class="mb-btn" id="mbn1">🔍<span>Поиск</span></button><button class="mb-btn" id="mbn2">♪<span>Биты</span></button><button class="mb-btn" id="mbn3">🥁<span>Драмкиты</span></button><button class="mb-btn" id="mbn4">🛠<span>Услуги</span></button></div></nav>

<script>
// ==================== КОНФИГ ====================
const TG_BOT_USERNAME = 'foroomverify_bot';
const HELP_TG = 'https://t.me/prikolovwork';

// ==================== СОСТОЯНИЕ ====================
let S = { threads: [], replies: {}, beats: [], drumkits: [], services: [], wall: {}, convs: [], stories: {}, reports: [], counter: 1000 };
let users = JSON.parse(localStorage.getItem('4r_users') || '[]');
let sess = JSON.parse(localStorage.getItem('4r_session') || 'null');
let _theme = localStorage.getItem('4r_theme') || 'dark';
let _homeTab = 'all';

// ==================== УТИЛИТЫ ====================
function toast(msg, isErr) { let box = document.getElementById('toasts'); let el = document.createElement('div'); el.className = 'toast' + (isErr ? ' toast-err' : ' toast-ok'); el.textContent = msg; box.appendChild(el); setTimeout(() => el.classList.add('on'), 10); setTimeout(() => { el.classList.remove('on'); setTimeout(() => el.remove(), 300); }, 3200); }
function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function relTime(ts) { let d = Math.floor((Date.now() - ts) / 1000); if (d < 60) return d + 'с'; if (d < 3600) return Math.floor(d / 60) + 'м'; if (d < 86400) return Math.floor(d / 3600) + 'ч'; return Math.floor(d / 86400) + 'д'; }
function mkId() { return String(++S.counter); }
function persist() { localStorage.setItem('4r_data', JSON.stringify(S)); localStorage.setItem('4r_users', JSON.stringify(users)); localStorage.setItem('4r_session', JSON.stringify(sess)); }
function loadData() { let d = localStorage.getItem('4r_data'); if (d) try { Object.assign(S, JSON.parse(d)); } catch(e) {} }
loadData();
function getUser(id) { return users.find(u => u.id === id); }
function updateUser(id, data) { let idx = users.findIndex(u => u.id === id); if (idx !== -1) { users[idx] = { ...users[idx], ...data }; if (sess && sess.id === id) sess = { ...sess, ...data }; persist(); } }

// ==================== TELEGRAM АВТОРИЗАЦИЯ (простая ссылка) ====================
function startTelegramAuth() {
  const authUrl = `https://oauth.telegram.org/auth?bot_id=7783655323&origin=${encodeURIComponent(window.location.origin)}&return_to=${encodeURIComponent(window.location.href)}&embed=0`;
  const popup = window.open(authUrl, 'telegram-auth', 'width=600,height=600,popup');
  if (popup) {
    const checkPopup = setInterval(() => {
      if (popup.closed) {
        clearInterval(checkPopup);
        // Проверяем, появился ли новый пользователь
        const newUser = localStorage.getItem('tg_auth_temp');
        if (newUser) {
          localStorage.removeItem('tg_auth_temp');
          const user = JSON.parse(newUser);
          onTelegramAuth(user);
        }
      }
    }, 500);
  }
}

// Обработка возврата из Telegram (будет вызвано из auth.html)
window.onTelegramAuth = function(user) {
  if (!user) return;
  let existing = users.find(u => u.tgId === user.id);
  if (existing) {
    sess = existing;
    toast(`С возвращением, ${existing.username}!`);
  } else {
    let newUser = {
      id: 'u' + mkId(), tgId: user.id, username: user.first_name + (user.last_name ? ' ' + user.last_name : ''),
      avatarBase64: user.photo_url || null, bio: '', badges: users.length === 0 ? ['early', 'verified'] : ['early'], verified: users.length === 0, isAdmin: users.length === 0,
      banned: false, mutedUntil: 0, threadCount: 0, commentCount: 0, friends: [], following: [], blockedUsers: [],
      bookmarkedThreads: [], bookmarkedBeats: [], bookmarkedDrumkits: [], bookmarkedServices: [],
      createdAt: Date.now(), lastSeen: Date.now()
    };
    users.push(newUser);
    sess = newUser;
    toast(`Добро пожаловать, ${newUser.username}!`);
  }
  persist();
  closeAuth();
  buildHeader();
  render();
};

function logout() { sess = null; persist(); buildHeader(); render(); }

// ==================== HEADER ====================
function buildHeader() {
  let nav = document.getElementById('hnav');
  if (nav) {
    nav.innerHTML = `<button class="hl" onclick="nav('#/board/tech')">⚙ Тех-раздел</button><button class="hl" onclick="nav('#/board/art')">◈ Арт</button><button class="hl" onclick="nav('#/board/music')">♪ Музыка</button><button class="hl" onclick="nav('#/board/shitposting')">✦ Шитпостинг</button><button class="hl" onclick="nav('#/beats')">♪ Биты</button><button class="hl" onclick="nav('#/drumkits')">🥁 Драмкиты</button><button class="hl" onclick="nav('#/services')">🛠 Услуги</button>`;
  }
  let hr = document.getElementById('hr');
  if (hr) {
    if (sess) {
      hr.innerHTML = `<button class="ico-btn" onclick="openSearch()">🔍</button><button class="ico-btn" onclick="toggleTheme()">${_theme === 'light' ? '🌙' : '☀'}</button><button class="ico-btn" onclick="openMsgPanel()">✉</button><button class="ico-btn" onclick="toggleNotif()">🔔</button><button class="btn btn-help btn-sm" onclick="window.open('${HELP_TG}', '_blank')">❓ Помощь</button><div style="position:relative"><button class="ico-btn" onclick="toggleUmenu()" style="padding:0;width:auto;">${getAvatarHTML(sess, 36)}</button><div id="umenu" style="display:none;position:absolute;right:0;top:100%;margin-top:8px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);min-width:200px;z-index:400;"><div style="padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600">${esc(sess.username)}</div><div class="umenu-item" style="padding:10px 16px;cursor:pointer" onclick="nav('#/profile');closeUmenu()">👤 Мой профиль</div><div class="umenu-item" style="padding:10px 16px;cursor:pointer" onclick="nav('#/bmarks');closeUmenu()">🔖 Закладки</div><div style="height:1px;background:var(--border);margin:4px 0"></div><div class="umenu-item" style="padding:10px 16px;cursor:pointer;color:var(--red)" onclick="logout();closeUmenu()">🚪 Выйти</div></div></div>`;
    } else {
      hr.innerHTML = `<button class="ico-btn" onclick="openSearch()">🔍</button><button class="ico-btn" onclick="toggleTheme()">${_theme === 'light' ? '🌙' : '☀'}</button><button class="btn btn-help btn-sm" onclick="window.open('${HELP_TG}', '_blank')">❓ Помощь</button><button class="btn btn-p" onclick="openAuth()">Войти через Telegram</button>`;
    }
  }
}
function getAvatarHTML(user, size) { return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${user?.avatarBase64 ? 'transparent' : '#4f7ed4'};overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:600;">${user?.avatarBase64 ? `<img src="${user.avatarBase64}" style="width:100%;height:100%;object-fit:cover">` : (user?.username?.[0]?.toUpperCase() || '?')}</div>`; }
function toggleUmenu() { let m = document.getElementById('umenu'); if (m) m.style.display = m.style.display === 'none' ? 'block' : 'none'; }
function closeUmenu() { document.getElementById('umenu')?.style.setProperty('display', 'none'); }
function toggleTheme() { _theme = _theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('4r_theme', _theme); document.body.classList.toggle('light', _theme === 'light'); buildHeader(); }
function openSearch() { document.getElementById('search-ov').style.display = 'flex'; setTimeout(() => document.getElementById('s-inp')?.focus(), 100); }
function closeSearch() { document.getElementById('search-ov').style.display = 'none'; }
function toggleNotif() { let p = document.getElementById('notif-panel'); p.style.display = p.style.display === 'none' ? 'flex' : 'none'; if (p.style.display === 'flex') p.innerHTML = `<div class="ph">Уведомления<button class="btn btn-g btn-sm" onclick="toggleNotif()">✕</button></div><div class="empty">Уведомлений пока нет</div>`; }
function openMsgPanel() { document.getElementById('msg-panel').style.transform = 'translateX(0)'; document.getElementById('msg-bd').style.display = 'block'; document.getElementById('mpi').innerHTML = `<div class="ph">Сообщения<button onclick="closeMsgPanel()">✕</button></div><div class="empty">Нет диалогов</div>`; }
function closeMsgPanel() { document.getElementById('msg-panel').style.transform = 'translateX(100%)'; document.getElementById('msg-bd').style.display = 'none'; }
function openAuth() { 
  document.getElementById('auth-ov').style.display = 'flex'; 
  document.getElementById('auth-box').innerHTML = `<div class="ph">Вход через Telegram<button class="btn btn-g btn-sm" onclick="closeAuth()">✕</button></div><div class="pb" style="text-align:center;padding:20px;"><a href="#" onclick="startTelegramAuth(); return false;" class="tg-login-btn">🔐 Войти через Telegram</a><p style="font-size:12px;color:var(--t3);margin-top:20px;">Нажмите кнопку, чтобы войти с помощью Telegram.<br>Откроется новое окно для подтверждения.</p></div>`; 
}
function closeAuth() { document.getElementById('auth-ov').style.display = 'none'; }
function nav(hash) { location.hash = hash; render(); }

// ==================== ОСТАЛЬНЫЕ ФУНКЦИИ ====================
function render() { let hash = location.hash.slice(1) || '/'; buildHeader(); if (hash === '/' || hash === '') renderHome(); else if (hash === '/beats') renderBeats(); else if (hash === '/drumkits') renderDrumkits(); else if (hash === '/services') renderServices(); else if (hash === '/music') renderMusic(); else if (hash === '/profile') renderProfile(sess?.id); else if (hash === '/bmarks') renderBookmarks(); else if (hash === '/admin') renderAdmin(); else if (hash.startsWith('/board/')) renderBoard(hash.slice(7)); else if (hash.startsWith('/thread/')) renderThread(hash.slice(8)); else if (hash.startsWith('/profile/')) renderProfile(hash.slice(9)); else renderHome(); }
function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('on')); document.getElementById(id)?.classList.add('on'); }

// ДЕМО-ДАННЫЕ ДЛЯ ПРОВЕРКИ
if (S.threads.length === 0) {
  S.threads.push({ id: 't1', boardId: 'tech', title: 'Добро пожаловать в 4room!', op: { uid: null, author: 'Admin', content: 'Это тестовая тема. Создавайте свои темы и начинайте общение!', createdAt: Date.now() }, replyCount: 0, lastActivity: Date.now() });
  persist();
}

function renderHome() { let el = document.getElementById('p-home'); let threads = S.threads.slice().sort((a,b) => b.lastActivity - a.lastActivity).slice(0, 20); el.innerHTML = `<div class="w"><div class="stories-bar">${sess ? `<div class="story-item" onclick="openStoryUpload()"><div class="story-ring"><div class="story-ring-inner">+</div></div><div class="story-name">Мои</div></div>` : ''}</div><div class="htabs" style="display:flex;gap:8px;margin-bottom:20px"><button class="stab ${_homeTab === 'all' ? 'on' : ''}" onclick="setHomeTab('all')">🌐 Все темы</button>${sess ? `<button class="stab ${_homeTab === 'friends' ? 'on' : ''}" onclick="setHomeTab('friends')">👥 Друзья</button>` : ''}</div><div class="feed">${threads.map(th => `<div class="post" onclick="nav('#/thread/${th.id}')"><div class="post-header"><div class="avatar avatar-sm">${th.op?.author?.[0]?.toUpperCase() || '?'}</div><div><div class="post-author">${esc(th.op?.author || 'Аноним')}</div><div class="post-time">${relTime(th.lastActivity)}</div></div></div><div style="font-weight:600">${esc(th.title)}</div><div class="post-content" style="font-size:13px;color:var(--t2)">${esc(th.op?.content?.slice(0, 100) || '')}</div><div style="margin-top:8px"><span class="pill">💬 ${th.replyCount || 0} ответов</span></div></div>`).join('') || '<div class="empty">Нет тем. Создайте первую тему!</div>'}</div></div>`; showPage('p-home'); }
function setHomeTab(tab) { _homeTab = tab; renderHome(); }
function openStoryUpload() { if (!sess) { openAuth(); return; } let input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = (e) => { let file = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => { if (!S.stories[sess.id]) S.stories[sess.id] = []; S.stories[sess.id].push({ id: 'st' + mkId(), image: ev.target.result, createdAt: Date.now(), expires: Date.now() + 24*3600000 }); persist(); toast('История опубликована!'); renderHome(); }; reader.readAsDataURL(file); }; input.click(); }

function renderBoard(id) { let threads = S.threads.filter(t => t.boardId === id); let boardNames = { tech: 'Тех-раздел', art: 'Арт', music: 'Музыка', shitposting: 'Шитпостинг' }; let el = document.getElementById('p-board'); el.innerHTML = `<div class="w"><h1 style="margin-bottom:20px">${boardNames[id] || id}</h1>${sess ? `<button class="btn btn-p mb-4" onclick="showNewThreadForm('${id}')">+ Новая тема</button><div id="new-thread-form" style="display:none" class="panel mb-4"><div class="ph">Новая тема<button class="btn btn-g btn-sm" onclick="hideNewThreadForm()">✕</button></div><div class="pb"><input id="nt-title" placeholder="Заголовок"><textarea id="nt-content" rows="4" placeholder="Текст темы..."></textarea><div class="pf"><button class="btn btn-g" onclick="hideNewThreadForm()">Отмена</button><button class="btn btn-p" onclick="createThread('${id}')">Создать</button></div></div></div>` : ''}<div class="feed">${threads.map(th => `<div class="post" onclick="nav('#/thread/${th.id}')"><div class="post-header"><div class="avatar avatar-sm">${th.op?.author?.[0]?.toUpperCase() || '?'}</div><div><div class="post-author">${esc(th.op?.author || 'Аноним')}</div><div class="post-time">${relTime(th.lastActivity)}</div></div></div><div style="font-weight:600">${esc(th.title)}</div><div style="margin-top:8px"><span class="pill">💬 ${th.replyCount || 0} ответов</span></div></div>`).join('') || '<div class="empty">В этом разделе пока нет тем</div>'}</div></div>`; showPage('p-board'); }
function showNewThreadForm() { document.getElementById('new-thread-form').style.display = 'block'; }
function hideNewThreadForm() { document.getElementById('new-thread-form').style.display = 'none'; }
function createThread(boardId) { let title = document.getElementById('nt-title')?.value.trim(); let content = document.getElementById('nt-content')?.value.trim(); if (!title || !content) { toast('Заполните все поля', true); return; } let thread = { id: 't' + mkId(), boardId, title, op: { uid: sess.id, author: sess.username, content, createdAt: Date.now() }, replyCount: 0, lastActivity: Date.now() }; S.threads.unshift(thread); persist(); hideNewThreadForm(); toast('Тема создана!'); nav('#/thread/' + thread.id); }

function renderThread(id) { let thread = S.threads.find(t => t.id === id); if (!thread) { document.getElementById('p-thread').innerHTML = `<div class="wn"><div class="empty">Тема не найдена</div></div>`; showPage('p-thread'); return; } let replies = S.replies[id] || []; let el = document.getElementById('p-thread'); el.innerHTML = `<div class="wn"><div class="card" style="margin-bottom:20px"><div style="padding:20px"><div style="font-size:22px;font-weight:700;margin-bottom:12px">${esc(thread.title)}</div><div class="flex" style="margin-bottom:16px;gap:12px"><div class="avatar avatar-sm">${thread.op.author?.[0]?.toUpperCase() || '?'}</div><div><div style="font-weight:500">${esc(thread.op.author)}</div><div style="font-size:12px;color:var(--t3)">${relTime(thread.op.createdAt)}</div></div></div><div style="white-space:pre-wrap;line-height:1.6">${esc(thread.op.content)}</div></div></div><div class="stitle">Ответы (${replies.length})</div>${replies.map(r => `<div class="card" style="margin-bottom:12px"><div style="padding:16px"><div class="flex" style="gap:12px;margin-bottom:12px"><div class="avatar avatar-sm">${r.author?.[0]?.toUpperCase() || '?'}</div><div><div style="font-weight:500">${esc(r.author)}</div><div style="font-size:11px;color:var(--t3)">${relTime(r.createdAt)}</div></div></div><div style="white-space:pre-wrap">${esc(r.content)}</div></div></div>`).join('')}${sess ? `<div class="card" style="margin-top:16px"><div class="ph">Ваш ответ</div><div class="pb"><textarea id="reply-text" rows="4" placeholder="Напишите ответ..."></textarea><div class="pf"><button class="btn btn-p" onclick="addReply('${id}')">Отправить</button></div></div></div>` : `<div class="empty">Войдите чтобы ответить</div>`}</div>`; showPage('p-thread'); }
function addReply(threadId) { let content = document.getElementById('reply-text')?.value.trim(); if (!content) { toast('Введите текст ответа', true); return; } let reply = { id: 'r' + mkId(), uid: sess.id, author: sess.username, content, createdAt: Date.now() }; if (!S.replies[threadId]) S.replies[threadId] = []; S.replies[threadId].push(reply); let thread = S.threads.find(t => t.id === threadId); if (thread) { thread.replyCount = (thread.replyCount || 0) + 1; thread.lastActivity = Date.now(); } persist(); toast('Ответ добавлен!'); renderThread(threadId); }

function renderBeats() { let beats = S.beats; let el = document.getElementById('p-beats'); el.innerHTML = `<div class="w"><div style="display:flex;justify-content:space-between;margin-bottom:24px"><h1>🎵 Маркетплейс битов</h1>${sess ? `<button class="btn btn-p" onclick="toggleBeatForm()">+ Продать бит</button>` : ''}</div><div id="beat-form" style="display:none" class="panel mb-4"><div class="ph">Новый бит<button class="btn btn-g btn-sm" onclick="toggleBeatForm()">✕</button></div><div class="pb"><input id="bt-title" placeholder="Название бита"><div class="g2"><input id="bt-price" type="number" placeholder="Цена (₽)"><input id="bt-bpm" type="number" placeholder="BPM"></div><select id="bt-genre"><option>Rap</option><option>Trap</option><option>Hip-Hop</option><option>Другое</option></select><input id="bt-contact" placeholder="Telegram для связи"><textarea id="bt-desc" rows="3" placeholder="Описание бита..."></textarea><div class="pf"><button class="btn btn-g" onclick="toggleBeatForm()">Отмена</button><button class="btn btn-p" onclick="submitBeat()">Опубликовать</button></div></div></div><div class="beat-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px">${beats.map(b => `<div class="card"><div style="padding:16px"><div style="font-size:16px;font-weight:600">${esc(b.title)}</div><div style="font-size:13px;color:var(--t3)">${b.bpm || '?'} BPM · ${b.genre || '?'}</div><div class="price">${b.price > 0 ? b.price + ' ₽' : 'Бесплатно'}</div><button class="btn btn-p btn-sm" onclick="buyBeat('${b.id}')">💸 Купить / Связаться</button></div></div>`).join('') || '<div class="empty" style="grid-column:1/-1"><div class="empty-ico">♪</div><p>Битов пока нет</p></div>'}</div></div>`; showPage('p-beats'); }
function toggleBeatForm() { let f = document.getElementById('beat-form'); if (f) f.style.display = f.style.display === 'none' ? 'block' : 'none'; }
function submitBeat() { let title = document.getElementById('bt-title')?.value.trim(); if (!title) { toast('Введите название', true); return; } let beat = { id: 'b' + mkId(), uid: sess.id, title, price: parseFloat(document.getElementById('bt-price')?.value) || 0, bpm: parseInt(document.getElementById('bt-bpm')?.value) || 0, genre: document.getElementById('bt-genre')?.value, desc: document.getElementById('bt-desc')?.value, contact: document.getElementById('bt-contact')?.value, createdAt: Date.now() }; S.beats.push(beat); persist(); toast('Бит опубликован!'); toggleBeatForm(); renderBeats(); }
function buyBeat(id) { let beat = S.beats.find(b => b.id === id); if (!beat) return; toast(`Свяжитесь с продавцом: ${beat.contact || 'Telegram не указан'}`); }

function renderDrumkits() { let kits = S.drumkits; let el = document.getElementById('p-drumkits'); el.innerHTML = `<div class="w"><div style="display:flex;justify-content:space-between;margin-bottom:24px"><h1>🥁 Драмкиты</h1>${sess ? `<button class="btn btn-p" onclick="toggleDrumkitForm()">+ Продать драмкит</button>` : ''}</div><div id="drumkit-form" style="display:none" class="panel mb-4"><div class="ph">Новый драмкит<button class="btn btn-g btn-sm" onclick="toggleDrumkitForm()">✕</button></div><div class="pb"><input id="dk-title" placeholder="Название драмкита"><input id="dk-price" type="number" placeholder="Цена (₽)"><textarea id="dk-desc" rows="3" placeholder="Описание..."></textarea><input id="dk-contact" placeholder="Telegram для связи"><div class="file-label" onclick="document.getElementById('dk-zip').click()" style="display:inline-flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s3s);border-radius:var(--r);cursor:pointer;">📦 Загрузить ZIP/RAR<input type="file" id="dk-zip" accept=".zip,.rar" style="display:none"></div><div class="pf"><button class="btn btn-g" onclick="toggleDrumkitForm()">Отмена</button><button class="btn btn-p" onclick="submitDrumkit()">Опубликовать</button></div></div></div><div class="drumkit-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px">${kits.map(k => `<div class="card"><div style="padding:16px"><div style="font-size:16px;font-weight:600">${esc(k.title)}</div><div class="price">${k.price > 0 ? k.price + ' ₽' : 'Бесплатно'}</div><button class="btn btn-p btn-sm" onclick="buyDrumkit('${k.id}')">📥 Купить / Скачать</button></div></div>`).join('') || '<div class="empty" style="grid-column:1/-1"><div class="empty-ico">📀</div><p>Драмкитов пока нет</p></div>'}</div></div>`; showPage('p-drumkits'); }
function toggleDrumkitForm() { let f = document.getElementById('drumkit-form'); if (f) f.style.display = f.style.display === 'none' ? 'block' : 'none'; }
function submitDrumkit() { let title = document.getElementById('dk-title')?.value.trim(); if (!title) { toast('Введите название', true); return; } let kit = { id: 'dk' + mkId(), uid: sess.id, title, price: parseFloat(document.getElementById('dk-price')?.value) || 0, desc: document.getElementById('dk-desc')?.value, contact: document.getElementById('dk-contact')?.value, zipFile: null, createdAt: Date.now() }; let zipInput = document.getElementById('dk-zip'); if (zipInput?.files[0]) { let reader = new FileReader(); reader.onload = (e) => { kit.zipFile = e.target.result; S.drumkits.push(kit); persist(); toast('Драмкит опубликован!'); toggleDrumkitForm(); renderDrumkits(); }; reader.readAsDataURL(zipInput.files[0]); } else { S.drumkits.push(kit); persist(); toast('Драмкит опубликован!'); toggleDrumkitForm(); renderDrumkits(); } }
function buyDrumkit(id) { let kit = S.drumkits.find(k => k.id === id); if (!kit) return; if (kit.zipFile) { let a = document.createElement('a'); a.href = kit.zipFile; a.download = `${kit.title}.zip`; a.click(); toast('Скачивание началось!'); } else { toast(`Свяжитесь с продавцом: ${kit.contact || 'Telegram не указан'}`); } }

function renderServices() { let services = S.services; let el = document.getElementById('p-services'); el.innerHTML = `<div class="w"><div style="display:flex;justify-content:space-between;margin-bottom:24px"><h1>🛠 Услуги</h1>${sess ? `<button class="btn btn-p" onclick="toggleServiceForm()">+ Предложить услугу</button>` : ''}</div><div id="service-form" style="display:none" class="panel mb-4"><div class="ph">Новая услуга<button class="btn btn-g btn-sm" onclick="toggleServiceForm()">✕</button></div><div class="pb"><input id="sv-title" placeholder="Название услуги"><input id="sv-price" type="number" placeholder="Цена (₽)"><select id="sv-type"><option>Сведение вокала</option><option>Мастеринг</option><option>Эксклюзивный бит</option><option>Аранжировка</option><option>Другое</option></select><textarea id="sv-desc" rows="4" placeholder="Описание услуги..."></textarea><div class="g2"><div><label>Пример (до)</label><input type="file" id="sv-before" accept="audio/*"></div><div><label>Пример (после)</label><input type="file" id="sv-after" accept="audio/*"></div></div><input id="sv-contact" placeholder="Telegram для связи"><div class="pf"><button class="btn btn-g" onclick="toggleServiceForm()">Отмена</button><button class="btn btn-p" onclick="submitService()">Опубликовать</button></div></div></div><div class="service-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px">${services.map(s => `<div class="card"><div style="padding:16px"><div style="font-size:16px;font-weight:600">${esc(s.title)}</div><div style="font-size:12px;color:var(--blue)">${s.type || 'Услуга'}</div><div class="price">${s.price > 0 ? s.price + ' ₽' : 'Договорная'}</div><button class="btn btn-p btn-sm" onclick="buyService('${s.id}')">📩 Заказать</button></div></div>`).join('') || '<div class="empty" style="grid-column:1/-1"><div class="empty-ico">🎧</div><p>Услуг пока нет</p></div>'}</div></div>`; showPage('p-services'); }
function toggleServiceForm() { let f = document.getElementById('service-form'); if (f) f.style.display = f.style.display === 'none' ? 'block' : 'none'; }
function submitService() { let title = document.getElementById('sv-title')?.value.trim(); if (!title) { toast('Введите название', true); return; } let sv = { id: 'sv' + mkId(), uid: sess.id, title, price: parseFloat(document.getElementById('sv-price')?.value) || 0, type: document.getElementById('sv-type')?.value, desc: document.getElementById('sv-desc')?.value, contact: document.getElementById('sv-contact')?.value, beforeAudio: null, afterAudio: null, createdAt: Date.now() }; let beforeFile = document.getElementById('sv-before')?.files[0]; let afterFile = document.getElementById('sv-after')?.files[0]; let processFiles = () => { if (beforeFile) { let r = new FileReader(); r.onload = (e) => { sv.beforeAudio = e.target.result; if (afterFile) { let r2 = new FileReader(); r2.onload = (e2) => { sv.afterAudio = e2.target.result; S.services.push(sv); persist(); toast('Услуга опубликована!'); toggleServiceForm(); renderServices(); }; r2.readAsDataURL(afterFile); } else { S.services.push(sv); persist(); toast('Услуга опубликована!'); toggleServiceForm(); renderServices(); } }; r.readAsDataURL(beforeFile); } else { if (afterFile) { let r = new FileReader(); r.onload = (e) => { sv.afterAudio = e.target.result; S.services.push(sv); persist(); toast('Услуга опубликована!'); toggleServiceForm(); renderServices(); }; r.readAsDataURL(afterFile); } else { S.services.push(sv); persist(); toast('Услуга опубликована!'); toggleServiceForm(); renderServices(); } } }; processFiles(); }
function buyService(id) { let sv = S.services.find(s => s.id === id); if (!sv) return; toast(`Свяжитесь с исполнителем: ${sv.contact || 'Telegram не указан'}`); }

function renderMusic() { let el = document.getElementById('p-music'); el.innerHTML = `<div class="w"><h1>♫ Музыка</h1><div class="empty"><div class="empty-ico">🎵</div><p>Топ чарт формируется из прослушиваний</p><button class="btn btn-p mt-3" onclick="nav('#/beats')">Перейти в биты</button></div></div>`; showPage('p-music'); }
function renderProfile(uid) { if (!uid) { if (!sess) { document.getElementById('p-profile').innerHTML = `<div class="wn"><div class="empty">Войдите чтобы просмотреть профиль<button class="btn btn-p mt-3" onclick="openAuth()">Войти</button></div></div>`; showPage('p-profile'); return; } uid = sess.id; } let user = getUser(uid); if (!user) { document.getElementById('p-profile').innerHTML = `<div class="wn"><div class="empty">Пользователь не найден</div></div>`; showPage('p-profile'); return; } let el = document.getElementById('p-profile'); el.innerHTML = `<div class="wn"><div class="card" style="text-align:center"><div style="padding:24px"><div style="display:flex;justify-content:center;margin-bottom:16px">${getAvatarHTML(user, 100)}</div><div style="font-size:24px;font-weight:700">${esc(user.username)}${user.verified ? '<span style="display:inline-block;width:20px;height:20px;background:var(--blue);border-radius:50%;color:#fff;font-size:12px;margin-left:6px;line-height:20px;">✓</span>' : ''}</div><div style="color:var(--t3);margin:12px 0">${esc(user.bio || 'Нет описания')}</div><div class="stats" style="display:flex;justify-content:center;gap:24px;margin:16px 0"><div><div style="font-weight:700">${user.threadCount || 0}</div><div style="font-size:11px;color:var(--t3)">тем</div></div><div><div style="font-weight:700">${user.commentCount || 0}</div><div style="font-size:11px;color:var(--t3)">ответов</div></div><div><div style="font-weight:700">${user.friends?.length || 0}</div><div style="font-size:11px;color:var(--t3)">друзей</div></div></div>${sess && sess.id !== user.id ? `<div class="actions"><button class="btn btn-p" onclick="sendDM('${user.id}')">✉ Написать</button><button class="btn btn-d" onclick="addFriend('${user.id}')" style="margin-left:12px">${(sess.friends || []).includes(user.id) ? '✓ В друзьях' : '+ В друзья'}</button></div>` : ''}${sess && sess.id === user.id ? `<div class="actions mt-3"><button class="btn btn-d" onclick="editProfile()">✎ Редактировать профиль</button></div>` : ''}</div></div></div>`; showPage('p-profile'); }
function editProfile() { let bio = prompt('О себе:', getUser(sess.id)?.bio || ''); if (bio !== null) updateUser(sess.id, { bio }); renderProfile(sess.id); }
function sendDM(uid) { openMsgPanel(); toast(`Напишите сообщение пользователю в ЛС`); }
function addFriend(uid) { let me = getUser(sess.id); if (!me) return; let friends = me.friends || []; if (friends.includes(uid)) { updateUser(sess.id, { friends: friends.filter(f => f !== uid) }); toast('Удалён из друзей'); } else { updateUser(sess.id, { friends: [...friends, uid] }); toast('Заявка отправлена'); } renderProfile(uid); }
function renderAdmin() { document.getElementById('p-admin').innerHTML = `<div class="w"><h1>⚙ Админ-панель</h1><div class="empty">Доступно только администраторам</div></div>`; showPage('p-admin'); }
function renderBookmarks() { document.getElementById('p-bmarks').innerHTML = `<div class="wn"><h1>🔖 Закладки</h1><div class="empty">У вас пока нет закладок</div></div>`; showPage('p-bmarks'); }

// ==================== ПЛЕЕР ====================
let player = { audio: null, init() { this.audio = new Audio(); this.audio.volume = 0.8; }, play(url, title, artist) { if (this.audio.src !== url) this.audio.src = url; document.getElementById('p-ttl').textContent = title || '—'; document.getElementById('p-art').textContent = artist || ''; document.getElementById('player').style.display = 'flex'; this.audio.play(); }, toggle() { this.audio.paused ? this.audio.play() : this.audio.pause(); }, updateUI() { let btn = document.getElementById('p-pbtn'); if (btn) btn.textContent = this.audio?.paused ? '▶' : '⏸'; }, hide() { this.audio.pause(); document.getElementById('player').style.display = 'none'; } };
player.init(); player.audio.onplay = () => player.updateUI(); player.audio.onpause = () => player.updateUI(); player.audio.ontimeupdate = () => { let pct = (player.audio.currentTime / player.audio.duration) * 100 || 0; document.getElementById('p-bar-f').style.width = pct + '%'; document.getElementById('p-time').textContent = Math.floor(player.audio.currentTime / 60) + ':' + String(Math.floor(player.audio.currentTime % 60)).padStart(2,'0'); };

// ==================== ПОИСК ====================
document.getElementById('s-inp')?.addEventListener('input', (e) => { let q = e.target.value.toLowerCase(); let results = []; results.push(...S.threads.filter(t => t.title.toLowerCase().includes(q)).slice(0, 3).map(t => `<div style="padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer" onclick="nav('#/thread/${t.id}');closeSearch()">📄 Тема: ${esc(t.title)}</div>`)); results.push(...users.filter(u => u.username.toLowerCase().includes(q)).slice(0, 3).map(u => `<div style="padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer" onclick="nav('#/profile/${u.id}');closeSearch()">👤 Пользователь: ${esc(u.username)}</div>`)); document.getElementById('s-res').innerHTML = results.length ? results.join('') : '<div class="empty">Ничего не найдено</div>'; });

// ==================== ГОРЯЧИЕ КЛАВИШИ ====================
document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 'n') { e.preventDefault(); if (sess && document.getElementById('new-thread-form')) document.getElementById('new-thread-form').style.display = 'block'; else openAuth(); } if (e.ctrlKey && e.key === '/') { e.preventDefault(); openSearch(); } if (e.key === 'Escape') { closeSearch(); closeMsgPanel(); closeUmenu(); } });

// ==================== ЗАПУСК ====================
document.addEventListener('DOMContentLoaded', () => { document.body.classList.toggle('light', _theme === 'light'); document.getElementById('logo').onclick = () => nav('#/'); document.getElementById('mob-btn').onclick = () => document.getElementById('mob-nav')?.classList.toggle('open'); document.getElementById('msg-bd').onclick = closeMsgPanel; document.getElementById('search-ov').onclick = (e) => { if (e.target === e.currentTarget) closeSearch(); }; document.getElementById('p-close')?.addEventListener('click', () => player.hide()); document.getElementById('p-pbtn')?.addEventListener('click', () => player.toggle()); document.getElementById('p-bar')?.addEventListener('click', (e) => { if (player.audio) { let rect = e.target.getBoundingClientRect(); player.audio.currentTime = ((e.clientX - rect.left) / rect.width) * player.audio.duration; } }); document.querySelector('.p-vol')?.addEventListener('input', (e) => { if (player.audio) player.audio.volume = parseFloat(e.target.value); }); render(); });
</script>
</body>
</html>
